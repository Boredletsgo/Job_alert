name: 🤖 Job Alert Agent

on:
  # Run every day at 8:00 AM IST (2:30 AM UTC)
  schedule:
    - cron: "30 2 * * *"

  # Also allow manual trigger from GitHub UI
  workflow_dispatch:
    inputs:
      force_notify:
        description: "Send alerts even if no new jobs"
        required: false
        default: "false"

jobs:
  run-job-agent:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Needed to commit seen_jobs.json

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 Install Dependencies
        run: pip install -r requirements.txt

      - name: 🤖 Run Job Alert Agent
        env:
          # Telegram (required for Telegram alerts)
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

          # Gmail (required for email alerts)
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}

          # Customize job search (optional)
          JOB_KEYWORDS: ${{ vars.JOB_KEYWORDS || 'software developer,data analyst,python developer' }}
          JOB_LOCATION: ${{ vars.JOB_LOCATION || 'Bengaluru' }}

        run: python main.py

      - name: 💾 Save seen_jobs.json (to avoid re-alerting)
        run: |
          git config user.name "Job Alert Bot"
          git config user.email "bot@job-alert-agent"
          cp seen_jobs.json /tmp/seen_jobs.json
          git checkout -- . || true
          git pull --rebase origin main
          cp /tmp/seen_jobs.json seen_jobs.json
          git add -f seen_jobs.json
          git diff --staged --quiet || git commit -m "chore: update seen jobs [skip ci]"
          git push || echo "Push failed, will retry next run"
